<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Jakarta EE 10</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            background-color: #0f3460;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid #1a5f7a;
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        p {
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,212,255,0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #response {
            margin-top: 20px;
            padding: 15px;
            background-color: #1a3a52;
            border-left: 4px solid #00d4ff;
            display: none;
            border-radius: 4px;
            color: #b0b0b0;
        }
        #response strong {
            color: #00d4ff;
        }
        .error {
            border-left-color: #ff6b6b !important;
            background-color: #3d2a2a !important;
        }
        .error strong {
            color: #ff6b6b !important;
        }
        small {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World - Jakarta EE 10</h1>
        <p>Welcome to the Hello World Jakarta EE 10 application!</p>

        <p>This is a simple frontend with a backend API. Click the button below to call the REST API.</p>

        <button onclick="callBackendAPI()">Call Backend API</button>

        <div id="response"></div>
    </div>

    <script>
        function callBackendAPI() {
            const responseDiv = document.getElementById('response');
            responseDiv.style.display = 'block';
            responseDiv.className = '';
            responseDiv.innerHTML = 'Loading...';

            fetch('/api/api/hello')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const timestamp = new Date(data.timestamp).toLocaleString();
                    responseDiv.innerHTML = `
                        <strong>Response from Backend API:</strong><br>
                        Message: ${data.message}<br>
                        Timestamp: ${timestamp}
                    `;
                })
                .catch(error => {
                    responseDiv.className = 'error';
                    responseDiv.innerHTML = `
                        <strong>Error calling backend API:</strong><br>
                        ${error.message}<br>
                        <small>Make sure the application is properly deployed and running.</small>
                    `;
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
