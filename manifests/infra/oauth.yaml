kind: Secret
apiVersion: v1
metadata:
  name: my-htpasswd
  namespace: openshift-config
data:
  htpasswd: 
type: Opaque
---
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - htpasswd:
        fileData:
          name: my-htpasswd
      mappingMethod: claim
      name: my-htpasswd
      type: HTPasswd
