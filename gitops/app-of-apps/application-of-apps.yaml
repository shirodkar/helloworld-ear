apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world-app-of-apps
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    directory:
      recurse: true
    path: manifests/app-of-apps
    repoURL: 'https://github.com/shirodkar/helloworld-ear.git'
    targetRevision: HEAD
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true