apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hello-world-app-project
  namespace: openshift-gitops
spec:
  clusterResourceBlacklist:
    - group: '*'
      kind: '*'
  description: POC App Project
  destinations:
    - namespace: hello-world-deploy
      server: 'https://kubernetes.default.svc'
    - namespace: hello-world-logging
      server: 'https://kubernetes.default.svc'
    - namespace: hello-world-s2i
      server: 'https://kubernetes.default.svc'
    - namespace: ''
      server: 'https://kubernetes.default.svc'
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange
    - group: operators.coreos.com
      kind: '*'
    - group: operator.openshift.io
      kind: '*'
    - group: storage.k8s.io
      kind: '*'
  sourceRepos:
    - 'https://github.com/shirodkar/helloworld-ear'
  roles:
    - description: Developer
      groups:
      - developers
      name: devops-admin
      policies:
      - p, proj:poc-app-project:devops-admin, applications, *, poc-app-project/*, allow
      - p, proj:poc-app-project:devops-admin, exec, create, poc-app-project/*, allow