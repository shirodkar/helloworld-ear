kind: DeploymentConfig
apiVersion: apps.openshift.io/v1
metadata:
  name: postgres
spec:
  replicas: 1
  revisionHistoryLimit: 10
  test: false
  selector:
    name: postgres
  template:
    metadata:
      creationTimestamp: null
      labels:
        name: postgres
    spec:
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres
      containers:
        - resources:
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - /usr/libexec/check-container
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          name: postgresql
          livenessProbe:
            exec:
              command:
                - /usr/libexec/check-container
                - '--live'
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: database-password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: database-name
          securityContext:
            capabilities: {}
            privileged: false
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
          terminationMessagePolicy: File
          image: 'image-registry.openshift-image-registry.svc:5000/openshift/postgresql'
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: eap-service-account
imagePullSecrets:
  - name: quay-secret
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: eap8-app-inventory-build-artifacts
  labels:
    rht.comp_ver: '8.0'
    rht.prod_name: Red_Hat_Runtimes
    app.kubernetes.io/instance: eap8-app-inventory
    rht.prod_ver: 2023-Q4
    com.company: Red_Hat
    app.openshift.io/runtime: eap
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: eap8-1.1.2
    rht.subcomp_t: application
    app.kubernetes.io/name: eap8-app-inventory
    rht.comp: EAP
spec:
  serviceAccount: eap-service-account
  nodeSelector: null
  output:
    to:
      kind: DockerImage
      name: 'quay.io/rh_ee_sshirodk/eap8-app-inventory-build-artifacts:latest'
    pushSecret:
      name: quay-secret
  resources: {}
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 1
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: DockerImage
        name: 'registry.redhat.io/jboss-eap-8/eap8-openjdk17-builder-openshift-rhel8:latest'
      pullSecret:
        name: my-pull-secret
      env:
        - name: CUSTOM_INSTALL_DIRECTORIES
          value: extensions
        - name: ARTIFACT_DIR
          value: ear/target
        - name: POSTGRESQL_DRIVER_VERSION
          value: '42.7.0'
      incremental: true
      forcePull: true
  postCommit: {}
  source:
    type: Git
    git:
      uri: 'https://github.com/shirodkar/helloworld-ear.git'
  triggers:
    - type: ConfigChange
  runPolicy: Serial
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: eap8-app-inventory
  labels:
    rht.comp_ver: '8.0'
    rht.prod_name: Red_Hat_Runtimes
    app.kubernetes.io/instance: eap8-app-inventory
    rht.prod_ver: 2023-Q4
    com.company: Red_Hat
    app.openshift.io/runtime: eap
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: eap8-1.1.2
    rht.subcomp_t: application
    app.kubernetes.io/name: eap8-app-inventory
    rht.comp: EAP
spec:
  serviceAccount: eap-service-account
  nodeSelector: null
  output:
    to:
      kind: DockerImage
      name: 'quay.io/rh_ee_sshirodk/eap8-app-inventory:latest'
    pushSecret:
      name: quay-secret
  resources: {}
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 1
  strategy:
    type: Docker
    dockerStrategy:
      from:
        kind: DockerImage
        name: 'registry.redhat.io/jboss-eap-8/eap8-openjdk17-runtime-openshift-rhel8:latest'
      pullSecret:
        name: my-pull-secret
  postCommit: {}
  source:
    type: Dockerfile
    dockerfile: |-
      FROM registry.redhat.io/jboss-eap-8/eap8-openjdk17-runtime-openshift-rhel8:latest
      COPY --chown=jboss:root /server $JBOSS_HOME
      RUN chmod -R ug+rwX $JBOSS_HOME
    images:
      - from:
          kind: DockerImage
          name: 'quay.io/rh_ee_sshirodk/eap8-app-inventory-build-artifacts:latest'
        paths:
          - sourcePath: /opt/server
            destinationDir: .
        pullSecret:
          name: quay-secret
  runPolicy: Serial
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: postgres-config
data:
  POSTGRESQL_JNDI: 'java:jboss/datasources/PostgreSQLDS'
  POSTGRESQL_URL: 'jdbc:postgresql://postgres:5432/postgres'
---
apiVersion: wildfly.org/v1alpha1
kind: WildFlyServer
metadata:
  name: app-inventory
spec:
  applicationImage: 'quay.io/rh_ee_sshirodk/eap8-app-inventory:latest'
  replicas: 1
  serviceAccountName: eap-service-account
  envFrom:
    - configMapRef:
        name: postgres-config
    - secretRef:
        name: postgres-credentials
  env:
    - name: HTTPS_KEYSTORE
      value: keystore.jks
    - name: HTTPS_KEYSTORE_DIR
      value: /etc/secrets/aaa/
    - name: HTTPS_KEY_PASSWORD
      value: password
    - name: HTTPS_KEYSTORE_TYPE
      value: JKS
  secrets:
    - keystore