kind: ServiceAccount
apiVersion: v1
metadata:
  name: eap
imagePullSecrets:
  - name: quay-secret
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: eap8-app-inventory-build-artifacts
  labels:
    rht.comp_ver: '8.0'
    rht.prod_name: Red_Hat_Runtimes
    app.kubernetes.io/instance: eap8-app-inventory
    rht.prod_ver: 2023-Q4
    com.company: Red_Hat
    app.openshift.io/runtime: eap
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: eap8-1.1.2
    rht.subcomp_t: application
    app.kubernetes.io/name: eap8-app-inventory
    rht.comp: EAP
spec:
  serviceAccount: eap
  nodeSelector: null
  output:
    to:
      kind: DockerImage
      name: 'quay.io/rh_ee_sshirodk/eap8-app-inventory-build-artifacts:latest'
    pushSecret:
      name: quay-secret
  resources: {}
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 1
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: DockerImage
        name: 'registry.redhat.io/jboss-eap-8/eap8-openjdk17-builder-openshift-rhel8:latest'
      pullSecret:
        name: my-pull-secret
      env:
        - name: CUSTOM_INSTALL_DIRECTORIES
          value: extensions
        - name: ARTIFACT_DIR
          value: ear/target
      incremental: true
      forcePull: true
  postCommit: {}
  source:
    type: Git
    git:
      uri: 'https://github.com/shirodkar/helloworld-ear.git'
  triggers:
    - type: ConfigChange
  runPolicy: Serial
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: eap8-app-inventory
  labels:
    rht.comp_ver: '8.0'
    rht.prod_name: Red_Hat_Runtimes
    app.kubernetes.io/instance: eap8-app-inventory
    rht.prod_ver: 2023-Q4
    com.company: Red_Hat
    app.openshift.io/runtime: eap
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: eap8-1.1.2
    rht.subcomp_t: application
    app.kubernetes.io/name: eap8-app-inventory
    rht.comp: EAP
spec:
  serviceAccount: eap
  nodeSelector: null
  output:
    to:
      kind: DockerImage
      name: 'quay.io/rh_ee_sshirodk/eap8-app-inventory:latest'
    pushSecret:
      name: quay-secret
  resources: {}
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 1
  strategy:
    type: Docker
    dockerStrategy:
      from:
        kind: DockerImage
        name: 'registry.redhat.io/jboss-eap-8/eap8-openjdk17-runtime-openshift-rhel8:latest'
      pullSecret:
        name: my-pull-secret
  postCommit: {}
  source:
    type: Dockerfile
    dockerfile: |-
      FROM registry.redhat.io/jboss-eap-8/eap8-openjdk17-runtime-openshift-rhel8:latest
      COPY --chown=jboss:root /server $JBOSS_HOME
      RUN chmod -R ug+rwX $JBOSS_HOME
    images:
      - from:
          kind: DockerImage
          name: 'quay.io/rh_ee_sshirodk/eap8-app-inventory-build-artifacts:latest'
        paths:
          - sourcePath: /opt/server
            destinationDir: .
        pullSecret:
          name: quay-secret
  runPolicy: Serial
---
apiVersion: wildfly.org/v1alpha1
kind: WildFlyServer
metadata:
  name: app-inventory
spec:
  applicationImage: 'quay.io/rh_ee_sshirodk/eap8-app-inventory:latest'
  replicas: 1
  serviceAccountName: eap
